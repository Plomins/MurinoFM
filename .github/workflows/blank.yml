name: Deploy MurinoFM

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: MurinoFM1
      - name: Run backend tests
        run: ./gradlew test --no-daemon
        working-directory: MurinoFM1

  # 2. ТЕСТЫ ФРОНТЕНДА
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
        working-directory: murinofm-client
      - name: Run tests (if any)
        run: npm test -- --passWithNoTests
        working-directory: murinofm-client
  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build React
        working-directory: murinofm-client
        run: |
          npm ci
          npm run build

      - name: Copy React static files to Spring Boot resources
        run: |
          mkdir -p MurinoFM1/src/main/resources/static
          cp -r murinofm-client/dist/* MurinoFM1/src/main/resources/static/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./MurinoFM1
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          -H "Accept: application/json"

      - name: Wait for deployment and check health
        run: |
          echo "Waiting 60 seconds for deployment to start..."
          sleep 60
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://murinofm-1.onrender.com/actuator/health)
            if [ "$STATUS" -eq 200 ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: health check returned $STATUS, waiting..."
            sleep 15
          done
          echo "Health check failed after multiple attempts"
          exit 1
